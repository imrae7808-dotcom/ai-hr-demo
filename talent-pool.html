<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 人才库 — 智能人才管理平台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--sidebar:#fff;--card:#fff;--card-hover:#f8f9fc;
  --primary:#4f6ef7;--primary-light:rgba(79,110,247,.08);--primary-dark:#3b5de7;
  --green:#10b981;--green-light:rgba(16,185,129,.08);
  --orange:#f59e0b;--orange-light:rgba(245,158,11,.08);
  --red:#ef4444;--red-light:rgba(239,68,68,.08);
  --purple:#8b5cf6;--purple-light:rgba(139,92,246,.08);
  --cyan:#06b6d4;--cyan-light:rgba(6,182,212,.08);
  --text:#1a1d26;--text2:#64748b;--text3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
  --radius:8px;--radius-lg:12px;
  --transition:all .2s ease;
}
body{font-family:'Inter','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}

/* ===== Layout ===== */
.app{display:flex;height:100vh;overflow:hidden}

/* ===== Sidebar ===== */
.sidebar{width:240px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header .logo{font-size:18px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:8px}
.sidebar-header .logo span{background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius);cursor:pointer;transition:var(--transition);font-size:13px;font-weight:500;color:var(--text2);margin-bottom:2px}
.nav-item:hover{background:var(--primary-light);color:var(--primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item .icon{width:20px;text-align:center;font-size:16px}
.nav-item .count{margin-left:auto;font-size:11px;font-weight:600;color:var(--text3);background:var(--bg);padding:1px 8px;border-radius:10px}
.nav-item.active .count{background:rgba(79,110,247,.15);color:var(--primary)}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--text3);text-align:center}

/* ===== Main Area ===== */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Top Bar */
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.search-box{flex:1;max-width:480px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:var(--transition)}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.1)}
.search-box input::placeholder{color:var(--text3)}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;border:none;transition:var(--transition);display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,110,247,.3)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:var(--red-light);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.btn-danger:hover{background:var(--red);color:#fff}
.theme-toggle{background:none;border:1px solid var(--border);width:32px;height:32px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--transition);color:var(--text2)}
.theme-toggle:hover{border-color:var(--primary);color:var(--primary)}

/* Content */
.content{flex:1;display:flex;overflow:hidden}

/* Filter Panel */
.filter-panel{width:220px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:16px;flex-shrink:0;display:none}
.filter-panel.open{display:block}
.filter-group{margin-bottom:16px}
.filter-group h4{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.filter-option{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;transition:var(--transition);font-size:12px;color:var(--text2)}
.filter-option:hover{background:var(--primary-light);color:var(--primary)}
.filter-option.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.filter-option .check{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;transition:var(--transition);flex-shrink:0}
.filter-option.active .check{background:var(--primary);border-color:var(--primary);color:#fff}
.filter-option .count{margin-left:auto;font-size:10px;color:var(--text3)}
.filter-clear{font-size:11px;color:var(--primary);cursor:pointer;padding:4px 8px;border-radius:4px;transition:var(--transition)}
.filter-clear:hover{background:var(--primary-light)}

/* List Area */
.list-area{flex:1;overflow-y:auto;padding:0}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;z-index:5}
.list-header .title{font-size:13px;font-weight:600;color:var(--text)}
.list-header .subtitle{font-size:11px;color:var(--text3);margin-left:8px}
.list-header .actions{display:flex;gap:6px;align-items:center}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.view-toggle button{padding:6px 10px;border:none;background:transparent;font-size:12px;color:var(--text3);transition:var(--transition)}
.view-toggle button.active{background:var(--primary);color:#fff}
.view-toggle button:hover:not(.active){background:var(--bg)}

/* Table View */
.candidate-table{width:100%;border-collapse:collapse}
.candidate-table th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap}
.candidate-table th.sortable{cursor:pointer;user-select:none}
.candidate-table th.sortable:hover{color:var(--primary)}
.candidate-table td{padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
.candidate-table tr{cursor:pointer;transition:var(--transition)}
.candidate-table tbody tr:hover{background:var(--card-hover)}
.candidate-table tbody tr.selected{background:var(--primary-light)}
.candidate-table .checkbox{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.candidate-table .checkbox.checked{background:var(--primary);border-color:var(--primary);color:#fff}
.candidate-table .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.candidate-table .name-cell{display:flex;align-items:center;gap:10px}
.candidate-table .name{font-weight:600;color:var(--text)}
.candidate-table .company{color:var(--text2);font-size:11px}
.candidate-table .tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:500}
.tag-blue{background:var(--primary-light);color:var(--primary)}
.tag-green{background:var(--green-light);color:var(--green)}
.tag-orange{background:var(--orange-light);color:var(--orange)}
.tag-red{background:var(--red-light);color:var(--red)}
.tag-purple{background:var(--purple-light);color:var(--purple)}
.tag-cyan{background:var(--cyan-light);color:var(--cyan)}
.status-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px}
.status-active{background:var(--green)}
.status-inactive{background:var(--text3)}
.status-risk{background:var(--red)}

/* Card View */
.card-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;padding:16px 20px}
.candidate-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:var(--transition)}
.candidate-card:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.candidate-card.selected{border-color:var(--primary);background:var(--primary-light)}
.candidate-card-header{display:flex;gap:12px;margin-bottom:12px}
.candidate-card .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0}
.candidate-card .info h3{font-size:14px;font-weight:600;margin-bottom:2px}
.candidate-card .info .meta{font-size:11px;color:var(--text2)}
.candidate-card .tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.candidate-card .detail-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);padding:4px 0;border-top:1px solid var(--border)}
.candidate-card .detail-row .label{color:var(--text3)}
.candidate-card .detail-row .value{font-weight:500;color:var(--text)}

/* Detail Panel */
.detail-panel{width:380px;background:var(--sidebar);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:var(--transition);transform:translateX(100%);position:absolute;right:0;top:0;bottom:0;z-index:10}
.detail-panel.open{transform:translateX(0)}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px}
.detail-header .avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#fff;flex-shrink:0}
.detail-header .info h2{font-size:18px;font-weight:700;margin-bottom:2px}
.detail-header .info .meta{font-size:12px;color:var(--text2);line-height:1.6}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:18px;color:var(--text3);cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:var(--transition)}
.detail-close:hover{background:var(--bg);color:var(--text)}
.detail-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.detail-section h4{font-size:12px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap}
.detail-actions{padding:16px 20px;display:flex;gap:8px;flex-wrap:wrap}
.score-bar{height:6px;background:var(--bg);border-radius:3px;margin:6px 0 10px;overflow:hidden}
.score-bar .fill{height:100%;border-radius:3px;transition:width .6s ease}
.score-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px}
.score-row .label{color:var(--text2)}
.score-row .val{font-weight:700}
.timeline-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px}
.timeline-item:last-child{border-bottom:none}
.timeline-item .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);margin-top:4px;flex-shrink:0}
.timeline-item .time{font-size:10px;color:var(--text3);margin-bottom:2px}
.timeline-item .role{font-weight:600}
.timeline-item .company{color:var(--text2);font-size:11px}

/* Empty State */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
.empty-state .icon{font-size:48px;margin-bottom:12px;opacity:.5}
.empty-state p{font-size:13px;margin-bottom:4px}
.empty-state .hint{font-size:11px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:#fff;padding:10px 20px;border-radius:var(--radius);font-size:12px;font-weight:500;z-index:1000;transition:transform .3s ease;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Batch Bar */
.batch-bar{display:none;align-items:center;gap:12px;padding:10px 20px;background:var(--primary);color:#fff;font-size:12px;font-weight:500;position:sticky;bottom:0;z-index:5}
.batch-bar.show{display:flex}
.batch-bar .count{font-weight:700}
.batch-bar button{background:rgba(255,255,255,.2);color:#fff;border:none;padding:5px 12px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:var(--transition)}
.batch-bar button:hover{background:rgba(255,255,255,.3)}

/* Responsive */
@media(max-width:1024px){
  .filter-panel{position:absolute;left:0;top:0;bottom:0;z-index:20;box-shadow:var(--shadow-lg)}
  .detail-panel{width:100%;max-width:380px}
}
@media(max-width:768px){
  .sidebar{width:60px}
  .sidebar .nav-item span:not(.icon):not(.count){display:none}
  .sidebar-header .logo span{display:none}
  .sidebar-footer{display:none}
}
</style>
</head>

// ===== State =====
var state={
  view:'table',
  nav:'all',
  search:'',
  filters:{company:[],skill:[],city:[],exp:[],risk:[]},
  selected:new Set(),
  detailId:null,
  filterOpen:false
}

// ===== Color helpers =====
var COLORS=['#4f6ef7','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6']
function getAvatarColor(id){return COLORS[id%COLORS.length]}
function getRiskTag(r){
  if(r==='high') return '<span class="tag tag-red">高风险</span>'
  if(r==='medium') return '<span class="tag tag-orange">中风险</span>'
  return '<span class="tag tag-green">低风险</span>'
}
function getStatusDot(s){
  if(s==='active') return '<span class="status-dot status-active"></span>活跃'
  return '<span class="status-dot status-inactive"></span>不活跃'
}
function getMatchColor(m){return m>=80?'var(--green)':m>=60?'var(--orange)':'var(--red)'}

// ===== Build Filter Options =====
function buildFilters(){
  var companies=[...new Set(CANDIDATES.map(function(c){return c.company}))]
  var skills=[].concat.apply([],CANDIDATES.map(function(c){return c.skills}))
  skills=[...new Set(skills)]
  var cities=[...new Set(CANDIDATES.map(function(c){return c.city}))]
  var expRanges=['1-3年','3-5年','5-10年','10年+']
  var risks=[{val:'high',label:'高风险'},{val:'medium',label:'中风险'},{val:'low',label:'低风险'}]

  buildFilterGroup('filter-company',companies.map(function(c){return{val:c,label:c,count:CANDIDATES.filter(function(x){return x.company===c}).length}}),'company')
  buildFilterGroup('filter-skill',skills.slice(0,12).map(function(s){return{val:s,label:s,count:CANDIDATES.filter(function(x){return x.skills.indexOf(s)!==-1}).length}}),'skill')
  buildFilterGroup('filter-city',cities.map(function(c){return{val:c,label:c,count:CANDIDATES.filter(function(x){return x.city===c}).length}}),'city')
  buildFilterGroup('filter-exp',expRanges.map(function(e){return{val:e,label:e,count:0}}),'exp')
  buildFilterGroup('filter-risk',risks.map(function(r){return{val:r.val,label:r.label,count:CANDIDATES.filter(function(x){return x.risk===r.val}).length}}),'risk')
}

function buildFilterGroup(elId,options,filterKey){
  var el=document.getElementById(elId)
  el.innerHTML=options.map(function(opt){
    return'<div class="filter-option" onclick="toggleFilter(\''+filterKey+'\',\''+opt.val+'\',this)"><span class="check"></span><span>'+opt.label+'</span><span class="count">'+opt.count+'</span></div>'
  }).join('')
}

function toggleFilter(key,val,el){
  var arr=state.filters[key]
  var idx=arr.indexOf(val)
  if(idx===-1) arr.push(val); else arr.splice(idx,1)
  el.classList.toggle('active')
  el.querySelector('.check').textContent=idx===-1?'✓':''
  renderList()
}

function clearAllFilters(){
  state.filters={company:[],skill:[],city:[],exp:[],risk:[]}
  document.querySelectorAll('.filter-option').forEach(function(el){el.classList.remove('active');el.querySelector('.check').textContent=''})
  renderList()
}

// ===== Filter & Search =====
function getFilteredCandidates(){
  return CANDIDATES.filter(function(c){
    // Nav filter
    if(state.nav==='active'&&c.status!=='active') return false
    if(state.nav==='risk'&&c.risk==='low') return false
    if(state.nav==='starred'&&!c.starred) return false
    if(state.nav==='algo'&&!c.skills.some(function(s){return['无图方案','BEV感知','LiDAR','激光雷达','感知算法','3D Detection'].indexOf(s)!==-1})) return false
    if(state.nav==='frontend'&&!c.skills.some(function(s){return['React','Vue','TypeScript','Flutter','微前端'].indexOf(s)!==-1})) return false
    if(state.nav==='pm'&&!c.tags.some(function(s){return s.indexOf('产品')!==-1||s.indexOf('增长')!==-1})) return false
    if(state.nav==='data'&&!c.skills.some(function(s){return['Python','SQL','Tableau','机器学习','A/B测试'].indexOf(s)!==-1})) return false

    // Search
    if(state.search){
      var q=state.search.toLowerCase()
      var text=(c.name+' '+c.company+' '+c.title+' '+c.edu+' '+c.city+' '+c.skills.join(' ')+' '+c.tags.join(' ')).toLowerCase()
      if(text.indexOf(q)===-1) return false
    }

    // Filters
    if(state.filters.company.length&&state.filters.company.indexOf(c.company)===-1) return false
    if(state.filters.skill.length&&!state.filters.skill.some(function(s){return c.skills.indexOf(s)!==-1})) return false
    if(state.filters.city.length&&state.filters.city.indexOf(c.city)===-1) return false
    if(state.filters.risk.length&&state.filters.risk.indexOf(c.risk)===-1) return false
    if(state.filters.exp.length){
      var matchExp=state.filters.exp.some(function(e){
        if(e==='1-3年') return c.exp>=1&&c.exp<=3
        if(e==='3-5年') return c.exp>=3&&c.exp<=5
        if(e==='5-10年') return c.exp>=5&&c.exp<=10
        if(e==='10年+') return c.exp>=10
        return false
      })
      if(!matchExp) return false
    }

    return true
  })
}

// ===== Render List =====
function renderList(){
  var filtered=getFilteredCandidates()
  document.getElementById('list-count').textContent='共 '+filtered.length+' 人'

  // Update nav counts
  document.getElementById('nav-all-count').textContent=CANDIDATES.length
  document.getElementById('nav-active-count').textContent=CANDIDATES.filter(function(c){return c.status==='active'}).length
  document.getElementById('nav-risk-count').textContent=CANDIDATES.filter(function(c){return c.risk==='high'||c.risk==='medium'}).length
  document.getElementById('nav-starred-count').textContent=CANDIDATES.filter(function(c){return c.starred}).length

  if(filtered.length===0){
    document.getElementById('candidate-list').innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配的候选人</p><p class="hint">试试调整搜索条件或筛选器</p></div>'
    return
  }

  if(state.view==='table') renderTable(filtered)
  else renderCards(filtered)

  updateBatchBar()
}

function renderTable(list){
  var html='<table class="candidate-table"><thead><tr>'
  html+='<th style="width:40px"><div class="checkbox'+(state.selected.size===list.length&&list.length>0?' checked':'')+'" onclick="toggleSelectAll()">'+(state.selected.size===list.length&&list.length>0?'✓':'')+'</div></th>'
  html+='<th>候选人</th><th>岗位</th><th>技能标签</th><th>经验</th><th>城市</th><th>匹配度</th><th>状态</th><th>风险</th><th style="width:40px"></th>'
  html+='</tr></thead><tbody>'
  list.forEach(function(c){
    var isSelected=state.selected.has(c.id)
    html+='<tr class="'+(isSelected?'selected':'')+'" onclick="toggleSelect('+c.id+',event)">'
    html+='<td><div class="checkbox'+(isSelected?' checked':'')+'">'+(isSelected?'✓':'')+'</div></td>'
    html+='<td><div class="name-cell"><div class="avatar" style="background:'+getAvatarColor(c.id)+'">'+c.name[0]+'</div><div><div class="name">'+c.name+'</div><div class="company">'+c.company+'</div></div></div></td>'
    html+='<td>'+c.title+'</td>'
    html+='<td><div class="tags">'+c.skills.slice(0,3).map(function(s){return'<span class="tag tag-blue">'+s+'</span>'}).join('')+'</div></td>'
    html+='<td>'+c.exp+'年</td>'
    html+='<td>'+c.city+'</td>'
    html+='<td><span style="color:'+getMatchColor(c.match)+';font-weight:700">'+c.match+'%</span></td>'
    html+='<td>'+getStatusDot(c.status)+'</td>'
    html+='<td>'+getRiskTag(c.risk)+'</td>'
    html+='<td><button style="background:none;border:none;font-size:14px;cursor:pointer" onclick="event.stopPropagation();toggleStar('+c.id+')">'+(c.starred?'📌':'🏷️')+'</button></td>'
    html+='</tr>'
  })
  html+='</tbody></table>'
  document.getElementById('candidate-list').innerHTML=html
}

function renderCards(list){
  var html='<div class="card-view">'
  list.forEach(function(c){
    html+='<div class="candidate-card" onclick="showDetail('+c.id+')">'
    html+='<div class="candidate-card-header">'
    html+='<div class="avatar" style="background:'+getAvatarColor(c.id)+'">'+c.name[0]+'</div>'
    html+='<div class="info"><h3>'+c.name+'</h3><div class="meta">'+c.company+' · '+c.title+'</div></div>'
    html+='</div>'
    html+='<div class="tags">'+c.skills.slice(0,4).map(function(s){return'<span class="tag tag-blue">'+s+'</span>'}).join('')+getRiskTag(c.risk)+'</div>'
    html+='<div class="detail-row"><span class="label">学历</span><span class="value">'+c.edu+'</span></div>'
    html+='<div class="detail-row"><span class="label">经验</span><span class="value">'+c.exp+'年</span></div>'
    html+='<div class="detail-row"><span class="label">城市</span><span class="value">'+c.city+'</span></div>'
    html+='<div class="detail-row"><span class="label">匹配度</span><span class="value" style="color:'+getMatchColor(c.match)+'">'+c.match+'%</span></div>'
    html+='</div>'
  })
  html+='</div>'
  document.getElementById('candidate-list').innerHTML=html
}

// ===== Selection =====
function toggleSelect(id,e){
  if(e&&e.target.closest('.checkbox')){} // allow checkbox click
  if(state.selected.has(id)) state.selected.delete(id); else state.selected.add(id)
  renderList()
}

function toggleSelectAll(){
  var filtered=getFilteredCandidates()
  if(state.selected.size===filtered.length){
    state.selected.clear()
  } else {
    filtered.forEach(function(c){state.selected.add(c.id)})
  }
  renderList()
}

function clearSelection(){
  state.selected.clear()
  renderList()
}

function updateBatchBar(){
  var bar=document.getElementById('batch-bar')
  if(state.selected.size>0){
    bar.classList.add('show')
    document.getElementById('batch-count').textContent=state.selected.size
  } else {
    bar.classList.remove('show')
  }
}

// ===== Detail Panel =====
function showDetail(id){
  state.detailId=id
  var c=CANDIDATES[id]
  var radarLabels=['技术深度','管理能力','沟通协作','创新思维','行业洞察','学习能力']

  // Build radar SVG
  var cx=140,cy=130,r=100,n=6
  var angles=radarLabels.map(function(_,i){return(i*2*Math.PI/n)-Math.PI/2})
  var svg=''
  for(var lv=1;lv<=5;lv++){
    var pts=angles.map(function(a){return(cx+r*lv/5*Math.cos(a)).toFixed(1)+','+(cy+r*lv/5*Math.sin(a)).toFixed(1)}).join(' ')
    svg+='<polygon points="'+pts+'" fill="none" stroke="var(--border)" stroke-width="1"/>'
  }
  angles.forEach(function(a,i){
    svg+='<line x1="'+cx+'" y1="'+cy+'" x2="'+(cx+r*Math.cos(a)).toFixed(1)+'" y2="'+(cy+r*Math.sin(a)).toFixed(1)+'" stroke="var(--border)" stroke-width="1"/>'
    var lx=cx+(r+20)*Math.cos(a),ly=cy+(r+20)*Math.sin(a)
    svg+='<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="var(--text2)" font-size="9" font-weight="600">'+radarLabels[i]+'</text>'
  })
  var dataPts=c.radar.map(function(v,i){return(cx+r*v/100*Math.cos(angles[i])).toFixed(1)+','+(cy+r*v/100*Math.sin(angles[i])).toFixed(1)}).join(' ')
  svg+='<polygon points="'+dataPts+'" fill="rgba(79,110,247,.12)" stroke="var(--primary)" stroke-width="2"/>'
  c.radar.forEach(function(v,i){
    svg+='<circle cx="'+(cx+r*v/100*Math.cos(angles[i])).toFixed(1)+'" cy="'+(cy+r*v/100*Math.sin(angles[i])).toFixed(1)+'" r="4" fill="var(--primary)" stroke="var(--card)" stroke-width="2"/>'
  })

  var html=''
  html+='<button class="detail-close" onclick="closeDetail()">✕</button>'
  html+='<div class="detail-header">'
  html+='<div class="avatar" style="background:'+getAvatarColor(c.id)+'">'+c.name[0]+'</div>'
  html+='<div class="info"><h2>'+c.name+'</h2><div class="meta">'+c.company+' · '+c.title+'<br>'+c.edu+' · '+c.exp+'年经验 · '+c.city+'</div></div>'
  html+='</div>'

  // Quick Stats
  html+='<div class="detail-section" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center">'
  html+='<div><div style="font-size:22px;font-weight:800;color:var(--primary)">'+c.match+'%</div><div style="font-size:10px;color:var(--text3)">匹配度</div></div>'
  html+='<div><div style="font-size:22px;font-weight:800;color:var(--green)">'+c.salary+'万</div><div style="font-size:10px;color:var(--text3)">薪资预期</div></div>'
  html+='<div><div style="font-size:22px;font-weight:800">'+c.age+'</div><div style="font-size:10px;color:var(--text3)">年龄</div></div>'
  html+='</div>'

  // Tags
  html+='<div class="detail-section"><h4>🏷️ 标签</h4><div class="detail-tags">'
  html+='<span class="tag tag-blue">'+c.edu+'</span>'
  html+='<span class="tag tag-green">'+c.exp+'年经验</span>'
  html+='<span class="tag tag-purple">'+c.city+'</span>'
  html+=getRiskTag(c.risk)
  c.tags.forEach(function(t){html+='<span class="tag tag-cyan">'+t+'</span>'})
  html+='</div></div>'

  // Skills
  html+='<div class="detail-section"><h4>🛠️ 技能</h4><div class="detail-tags">'
  c.skills.forEach(function(s){html+='<span class="tag tag-blue">'+s+'</span>'})
  html+='</div></div>'

  // Radar
  html+='<div class="detail-section"><h4>📊 能力雷达</h4><div style="display:flex;justify-content:center"><svg viewBox="0 0 280 280" style="max-width:240px">'+svg+'</svg></div></div>'

  // Match Scores
  html+='<div class="detail-section"><h4>🎯 岗位匹配</h4>'
  var matchJobs=[{name:'自动驾驶算法',score:Math.max(30,c.match-5)},{name:'前端开发',score:Math.max(20,c.match-30)},{name:'产品经理',score:Math.max(15,c.match-40)}]
  matchJobs.sort(function(a,b){return b.score-a.score})
  matchJobs.forEach(function(j){
    var clr=j.score>=80?'var(--green)':j.score>=60?'var(--orange)':'var(--red)'
    html+='<div class="score-row"><span class="label">'+j.name+'</span><span class="val" style="color:'+clr+'">'+j.score+'%</span></div>'
    html+='<div class="score-bar"><div class="fill" style="width:'+j.score+'%;background:'+clr+'"></div></div>'
  })
  html+='</div>'

  // Timeline
  html+='<div class="detail-section"><h4>📈 职业轨迹</h4>'
  c.timeline.forEach(function(t){
    html+='<div class="timeline-item"><div class="dot"></div><div><div class="time">'+t.year+'</div><div class="role">'+t.role+'</div><div class="company">'+t.company+'</div></div></div>'
  })

  html+='<div class="detail-section" style="background:var(--primary-light);border-bottom:none;margin:0;border-radius:0 0 var(--radius-lg) var(--radius-lg)"><h4>🤖 AI 综合评价</h4><p style="font-size:12px;color:var(--text2);line-height:1.8">'

  // Actions
  html+='<div class="detail-actions">'
  html+='<button class="btn btn-primary" onclick="contactCandidate('+c.id+')">📧 发送邮件</button>'
  html+='<button class="btn btn-outline" onclick="smsCandidate('+c.id+')">💬 发送短信</button>'
  html+='<button class="btn btn-outline" onclick="addToProcess('+c.id+')">📋 加入流程</button>'
  html+='<button class="btn btn-outline" onclick="toggleStar('+c.id+')">'+(c.starred?'取消收藏':'📌 收藏')+'</button>'
  html+='</div>'

  document.getElementById('detail-content').innerHTML=html
  document.getElementById('detail-panel').classList.add('open')
}

  })
  // Update title
  var titles={all:'全部候选人',active:'活跃人才',risk:'流失风险',new:'本周新增',starred:'已收藏',algo:'算法类',frontend:'前端类',pm:'产品类',data:'数据类'}
  document.getElementById('list-title').textContent=titles[nav]||'全部候选人'
  state.selected.clear()
  renderList()
}

// ===== View =====
function switchView(v){
  state.view=v
  document.getElementById('view-table').classList.toggle('active',v==='table')
  document.getElementById('view-card').classList.toggle('active',v==='card')
  renderList()
}

// ===== Search =====
function handleSearch(){
  state.search=document.getElementById('global-search').value.trim()
  renderList()
}

// ===== Filter Panel =====
function toggleFilterPanel(){
  state.filterOpen=!state.filterOpen
  document.getElementById('filter-panel').classList.toggle('open',state.filterOpen)
}

// ===== Toast =====
function showToast(msg){
  var el=document.getElementById('toast')
  el.textContent=msg
  el.classList.add('show')
  setTimeout(function(){el.classList.remove('show')},2500)
}

// ===== Init =====
buildFilters()
renderList()
