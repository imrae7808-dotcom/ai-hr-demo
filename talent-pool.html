<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>AI 人才库 — 智能人才管理平台</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f0f2f5;--sidebar:#fff;--card:#fff;--card-hover:#f8f9fc;
  --primary:#4f6ef7;--primary-light:rgba(79,110,247,.08);--primary-dark:#3b5de7;
  --green:#10b981;--green-light:rgba(16,185,129,.08);
  --orange:#f59e0b;--orange-light:rgba(245,158,11,.08);
  --red:#ef4444;--red-light:rgba(239,68,68,.08);
  --purple:#8b5cf6;--purple-light:rgba(139,92,246,.08);
  --cyan:#06b6d4;--cyan-light:rgba(6,182,212,.08);
  --text:#1a1d26;--text2:#64748b;--text3:#94a3b8;
  --border:#e2e8f0;--border2:#cbd5e1;
  --shadow:0 1px 3px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
  --radius:8px;--radius-lg:12px;
}
[data-theme="dark"]{
  --bg:#0a0e1a;--sidebar:#0f1424;--card:#141a30;--card-hover:#1a2240;
  --primary:#6b8aff;--primary-light:rgba(107,138,255,.12);--primary-dark:#5a7af0;
  --green:#34d399;--green-light:rgba(52,211,153,.1);
  --orange:#fbbf24;--orange-light:rgba(251,191,36,.1);
  --red:#f87171;--red-light:rgba(248,113,113,.1);
  --purple:#a78bfa;--purple-light:rgba(167,139,250,.1);
  --cyan:#22d3ee;--cyan-light:rgba(34,211,238,.1);
  --text:#e8ecf4;--text2:#8892a8;--text3:#5a6478;
  --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.12);
  --shadow:0 2px 8px rgba(0,0,0,.3);
  --shadow-lg:0 10px 40px rgba(0,0,0,.4);
}
body{font-family:'Inter','Microsoft YaHei',system-ui,sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh;transition:background .3s,color .3s}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
.app{display:flex;height:100vh;overflow:hidden;position:relative}

/* Gradient Background */
.gradient-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;overflow:hidden;pointer-events:none}
.gradient-bg .orb{position:absolute;border-radius:50%;filter:blur(100px);opacity:.12;animation:orbFloat 25s ease-in-out infinite}
.gradient-bg .orb:nth-child(1){width:500px;height:500px;background:var(--primary);top:-150px;left:-100px}
.gradient-bg .orb:nth-child(2){width:400px;height:400px;background:var(--purple);top:40%;right:-120px;animation-delay:-8s}
.gradient-bg .orb:nth-child(3){width:350px;height:350px;background:var(--cyan);bottom:-80px;left:35%;animation-delay:-16s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(40px,-25px) scale(1.08)}50%{transform:translate(-15px,35px) scale(.94)}75%{transform:translate(25px,15px) scale(1.04)}}

/* Sidebar */
.sidebar{width:220px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:background .3s,border-color .3s;position:relative;z-index:2}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border);transition:border-color .3s}
.sidebar-header .logo{font-size:18px;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:8px;transition:transform .2s}
.sidebar-header .logo:hover{transform:scale(1.02)}
.sidebar-header .logo span{background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% 200%;animation:logoShimmer 3s ease infinite}
@keyframes logoShimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sidebar-nav{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.sidebar-nav::-webkit-scrollbar{width:4px}
.sidebar-nav::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.nav-section{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:8px 12px 4px;margin-top:8px}
.nav-section:first-child{margin-top:0}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);font-size:12px;font-weight:500;color:var(--text2);margin-bottom:1px;position:relative}
.nav-item:hover{background:var(--primary-light);color:var(--primary);transform:translateX(2px)}
.nav-item.active{background:var(--primary-light);color:var(--primary);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--primary);border-radius:0 3px 3px 0}
.nav-item .icon{width:18px;text-align:center;font-size:14px}
.nav-item .count{margin-left:auto;font-size:9px;font-weight:600;color:var(--text3);background:var(--bg);padding:2px 7px;border-radius:10px;transition:all .2s;min-width:20px;text-align:center}
.nav-item.active .count{background:rgba(79,110,247,.15);color:var(--primary)}
.nav-item:hover .count{background:var(--primary-light);color:var(--primary)}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);font-size:10px;color:var(--text3);display:flex;align-items:center;gap:6px}
.sidebar-footer .ver{background:var(--primary-light);color:var(--primary);padding:1px 6px;border-radius:8px;font-weight:600;font-size:9px}

/* Risk Badge (from index.html) */
.risk-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:600}
.risk-badge.high{background:rgba(239,68,68,.1);color:var(--red)}
.risk-badge.medium{background:rgba(245,158,11,.1);color:var(--orange)}
.risk-badge.low{background:rgba(52,211,153,.1);color:var(--green)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative;z-index:1}
.topbar{background:var(--sidebar);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-shrink:0;transition:background .3s,border-color .3s;backdrop-filter:blur(10px)}
.topbar-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(79,110,247,.06);border:1px solid rgba(79,110,247,.15);padding:5px 12px;border-radius:20px;font-size:11px;color:var(--primary);font-weight:500;white-space:nowrap;flex-shrink:0}
.topbar-badge .pulse{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
.search-box{flex:1;max-width:400px;position:relative}
.search-box input{width:100%;padding:9px 14px 9px 36px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;background:var(--bg);color:var(--text);outline:none;transition:all .2s cubic-bezier(.4,0,.2,1)}
.search-box input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
.search-box .icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px}
.topbar-actions{display:flex;gap:8px;align-items:center}
.btn{padding:8px 16px;border-radius:var(--radius);font-size:12px;font-weight:600;border:none;transition:all .2s cubic-bezier(.4,0,.2,1);display:inline-flex;align-items:center;gap:6px;position:relative;overflow:hidden}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;box-shadow:0 2px 8px rgba(79,110,247,.25)}
.btn-primary::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:.5s}
.btn-primary:hover::after{left:100%}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(79,110,247,.35)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-danger{background:var(--red-light);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff;transform:translateY(-1px)}

.content{flex:1;display:flex;overflow:hidden;position:relative}
.list-area{flex:1;overflow-y:auto}
.list-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;z-index:5;transition:background .3s}
.list-header .title{font-size:14px;font-weight:700;background:linear-gradient(135deg,var(--text),var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.list-header .subtitle{font-size:11px;color:var(--text3);margin-left:8px}
.view-toggle{display:flex;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.view-toggle button{padding:6px 12px;border:none;background:transparent;font-size:11px;color:var(--text3);transition:all .2s}
.view-toggle button:hover{color:var(--primary);background:var(--primary-light)}
.view-toggle button.active{background:var(--primary);color:#fff}

/* Table */
.candidate-table{width:100%;border-collapse:collapse}
.candidate-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);background:var(--sidebar);position:sticky;top:0;text-transform:uppercase;letter-spacing:.3px;white-space:nowrap;transition:background .3s}
.candidate-table td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle;transition:background .15s}
.candidate-table tbody tr{cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1)}
.candidate-table tbody tr:hover{background:var(--card-hover);transform:scale(1.005)}
.avatar{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;transition:transform .2s,box-shadow .2s;box-shadow:0 2px 6px rgba(0,0,0,.1)}
.avatar:hover{transform:scale(1.1);box-shadow:0 4px 12px rgba(0,0,0,.15)}
.name-cell{display:flex;align-items:center;gap:8px}
.name-cell .name{font-weight:600;font-size:12px}
.name-cell .company{color:var(--text2);font-size:10px}
.tags{display:flex;gap:4px;flex-wrap:wrap}
.tag{padding:3px 10px;border-radius:14px;font-size:9px;font-weight:500;white-space:nowrap;transition:all .2s;border:1px solid transparent}
.tag:hover{transform:scale(1.05)}
.tag-blue{border-color:rgba(79,110,247,.25);background:rgba(79,110,247,.06);color:var(--primary)}
.tag-green{border-color:rgba(16,185,129,.25);background:rgba(16,185,129,.06);color:var(--green)}
.tag-orange{border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.06);color:var(--orange)}
.tag-red{border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.06);color:var(--red)}
.tag-purple{border-color:rgba(139,92,246,.25);background:rgba(139,92,246,.06);color:var(--purple)}
.tag-cyan{border-color:rgba(6,182,212,.25);background:rgba(6,182,212,.06);color:var(--cyan)}
.status-dot{width:5px;height:5px;border-radius:50%;display:inline-block;margin-right:4px}
.status-active{background:var(--green)}
.status-inactive{background:var(--text3)}

/* Card View */
.card-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;padding:14px 20px}
.candidate-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.candidate-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--purple));opacity:0;transition:opacity .25s}
.candidate-card:hover{border-color:var(--primary);box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.candidate-card:hover::before{opacity:1}
.candidate-card-header{display:flex;gap:10px;margin-bottom:10px}
.candidate-card .avatar{width:36px;height:36px;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.candidate-card .info h3{font-size:13px;font-weight:600;margin-bottom:2px}
.candidate-card .info .meta{font-size:10px;color:var(--text2)}
.candidate-card .tags{gap:4px}
.candidate-card .detail-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text2);padding:5px 0;border-top:1px solid var(--border);transition:background .15s}
.candidate-card .detail-row:hover{background:var(--primary-light);margin:0 -8px;padding:5px 8px;border-radius:var(--radius)}
.candidate-card .detail-row .value{font-weight:600;color:var(--text)}

/* Detail Panel */
.detail-panel{width:480px;background:var(--sidebar);border-left:1px solid var(--border);overflow-y:auto;flex-shrink:0;transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s;transform:translateX(100%);position:absolute;right:0;top:0;bottom:0;z-index:10;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.detail-panel::-webkit-scrollbar{width:4px}
.detail-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.detail-panel.open{transform:translateX(0);box-shadow:-8px 0 30px rgba(0,0,0,.1)}
.detail-backdrop{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:9;opacity:0;pointer-events:none;transition:opacity .3s}
.detail-backdrop.open{opacity:1;pointer-events:auto}
.detail-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;position:relative}
.detail-header .avatar{width:52px;height:52px;font-size:20px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.detail-header .info h2{font-size:18px;font-weight:700;margin-bottom:3px}
.detail-header .info .meta{font-size:11px;color:var(--text2);line-height:1.6}
.detail-close{position:absolute;top:16px;right:16px;background:none;border:none;font-size:16px;color:var(--text3);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.detail-close:hover{background:var(--bg);color:var(--text);transform:rotate(90deg)}
.detail-section{padding:16px 20px;border-bottom:1px solid var(--border)}
.detail-section h4{font-size:11px;font-weight:700;margin-bottom:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap}
.score-bar{height:4px;background:var(--bg);border-radius:3px;margin:4px 0 8px;overflow:hidden}
.score-bar .fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.score-label{display:flex;justify-content:space-between;font-size:10px;margin-bottom:1px}
.score-label span:first-child{color:var(--text2)}
.score-label .val{font-weight:700}
.timeline-item{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;transition:background .15s}
.timeline-item:last-child{border-bottom:none}
.timeline-item:hover{background:var(--primary-light);margin:0 -8px;padding:8px;border-radius:var(--radius)}
.timeline-item .dot{width:8px;height:8px;border-radius:50%;background:var(--primary);margin-top:3px;flex-shrink:0;box-shadow:0 0 0 3px var(--primary-light)}
.timeline-item .time{font-size:9px;color:var(--text3);margin-bottom:1px}
.timeline-item .role{font-weight:600}
.timeline-item .company{color:var(--text2);font-size:10px}
.detail-actions{padding:16px 20px;display:flex;gap:8px;flex-wrap:wrap}
.act-history-item{display:flex;gap:6px;padding:4px 0;font-size:10px;color:var(--text2)}
.act-history-item .time{color:var(--text3);white-space:nowrap;min-width:60px}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--text);color:var(--bg);padding:12px 24px;border-radius:var(--radius-lg);font-size:12px;font-weight:600;z-index:1000;transition:transform .35s cubic-bezier(.4,0,.2,1);box-shadow:0 8px 32px rgba(0,0,0,.2);letter-spacing:.3px}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;opacity:0;transition:opacity .25s}
.modal-overlay.open{display:flex;opacity:1}
.modal{background:var(--card);border-radius:var(--radius-lg);width:560px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .3s cubic-bezier(.4,0,.2,1);scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
@keyframes modalIn{from{opacity:0;transform:translateY(24px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-header{padding:20px 22px 0;display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:17px;font-weight:700;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.modal-close{background:none;border:none;font-size:16px;color:var(--text3);cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:var(--bg);color:var(--text);transform:rotate(90deg)}
.modal-body{padding:18px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* Form */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{margin-bottom:0}
.form-group.full{grid-column:1/-1}
.form-group label{display:block;font-size:10px;font-weight:600;color:var(--text2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text);background:var(--bg);outline:none;transition:all .2s cubic-bezier(.4,0,.2,1)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
.form-group textarea{min-height:60px;resize:vertical}
.form-tags-input{display:flex;flex-wrap:wrap;gap:5px;padding:5px 7px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);min-height:32px;cursor:text;transition:all .2s}
.form-tags-input:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(79,110,247,.12)}
.form-tags-input .tag{display:flex;align-items:center;gap:3px;padding:1px 6px;border-radius:3px;font-size:10px;background:var(--primary-light);color:var(--primary)}
.form-tags-input .tag .rm{cursor:pointer;font-size:11px;opacity:.6;transition:opacity .15s}
.form-tags-input .tag .rm:hover{opacity:1}
.form-tags-input input{border:none;background:transparent;outline:none;font-size:11px;flex:1;min-width:60px;padding:1px;color:var(--text)}
.dup-warning{background:var(--orange-light);border:1px solid rgba(245,158,11,.3);border-radius:var(--radius);padding:10px 12px;margin-top:10px;font-size:11px;color:var(--orange);display:none;animation:fadeIn .2s}
.dup-warning.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.empty-state{text-align:center;padding:50px 20px;color:var(--text3)}
.empty-state .icon{font-size:40px;margin-bottom:10px;opacity:.5;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty-state p{font-size:12px}

/* Upload */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:32px 16px;text-align:center;cursor:pointer;transition:all .25s cubic-bezier(.4,0,.2,1);background:var(--bg)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--primary);background:var(--primary-light);transform:scale(1.01)}
.upload-file{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:var(--radius);margin-top:6px;font-size:11px;transition:all .2s}
.upload-file:hover{background:var(--card-hover)}
.upload-file .fname{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-file .fsize{color:var(--text3);font-size:10px;flex-shrink:0}
.upload-file .fremove{background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:2px 4px;flex-shrink:0;transition:transform .15s}
.upload-file .fremove:hover{transform:scale(1.2)}
.parse-status{font-size:10px;margin-top:4px;display:flex;align-items:center;gap:4px}
.parse-status .spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .6s linear infinite}
.parse-status .done{color:var(--green)}
.parse-status .fail{color:var(--red)}
.parse-preview{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px;margin-top:10px;max-height:150px;overflow-y:auto;font-size:10px;color:var(--text2);white-space:pre-wrap;line-height:1.5;font-family:monospace}
@keyframes spin{to{transform:rotate(360deg)}}

/* Stats Row (borrowed from 人才鱼塘) */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px 16px;position:relative;overflow:hidden;transition:all .25s}
.stat-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.stat-card .label{font-size:11px;color:var(--text2);font-weight:500;margin-bottom:6px}
.stat-card .value{font-size:28px;font-weight:800;line-height:1;margin-bottom:6px}
.stat-card .value.green{color:var(--green)}
.stat-card .value.blue{color:var(--primary)}
.stat-card .value.orange{color:var(--orange)}
.stat-card .value.accent{color:var(--primary)}
.stat-card .change{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.stat-card .change .up{color:var(--green);font-weight:600}
.stat-card .change .down{color:var(--red);font-weight:600}

/* Filter Bar (borrowed from 人才鱼塘) */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:0 2px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* Improved Talent Card (bio clamp) */
.talent-card .bio{font-size:12px;color:var(--text2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-top:8px}

/* Overview / Org Chart */
#overview-area{display:none;padding:20px;overflow-y:auto;height:100%}
#overview-area.active{display:block}
.overview-header{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.overview-header .sub{font-size:11px;color:var(--text3);font-weight:400}
.org-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:16px;transition:all .25s}
.org-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.org-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.org-card-header h3{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.org-card-header .badge{font-size:10px;background:rgba(79,110,247,.08);border:1px solid rgba(79,110,247,.2);color:var(--primary);padding:2px 10px;border-radius:14px;font-weight:600}
.org-tree{display:flex;flex-direction:column;align-items:center;gap:0}
.org-node{position:relative;text-align:center;padding:6px 12px;border-radius:var(--radius);font-size:11px;min-width:90px;transition:all .15s}
.org-node.ceo{background:var(--primary-light);color:var(--primary);font-weight:700;font-size:12px;border:1.5px solid var(--primary);padding:8px 16px}
.org-node.vp{background:var(--bg);border:1.5px solid var(--border2);font-weight:600;color:var(--text);margin-top:24px}
.org-node.vp .role{font-size:9px;color:var(--text3);display:block;margin-top:1px}
.org-branches{display:flex;gap:16px;justify-content:center;margin-top:0;position:relative}
.org-branches::before{content:'';position:absolute;top:0;left:20%;right:20%;height:1px;background:var(--border)}
.org-branch{display:flex;flex-direction:column;align-items:center;position:relative}
.org-branch::before{content:'';position:absolute;top:0;left:50%;width:1px;height:24px;background:var(--border)}
.org-members{margin-top:12px;display:flex;flex-direction:column;gap:6px;align-items:center}
.org-member{display:flex;align-items:center;gap:6px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);font-size:10px;cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);background:var(--card);min-width:120px;position:relative;overflow:hidden}
.org-member::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--primary),var(--purple));opacity:0;transition:opacity .2s}
.org-member:hover{border-color:var(--primary);box-shadow:var(--shadow);transform:translateY(-1px)}
.org-member:hover::before{opacity:1}
.org-member.looking{border-color:var(--green);background:rgba(16,185,129,.04)}
.org-member.looking::before{background:var(--green);opacity:1}
.org-member.connected::after{content:'🔗';font-size:9px;margin-left:auto}
.org-member .mname{font-weight:600;font-size:11px}
.org-member .mtitle{color:var(--text2);font-size:9px}
.org-vacancy{font-size:10px;color:var(--text3);padding:5px 10px;border:1px dashed var(--border);border-radius:var(--radius);min-width:120px;text-align:center}
.org-connector{width:1px;height:20px;background:var(--border);margin:0 auto}
.org-hline{height:1px;background:var(--border);margin:0 auto}

/* Position Grid */
.pos-grid{display:flex;flex-direction:column;gap:4px;padding:0 4px}
.pos-card{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:all .2s cubic-bezier(.4,0,.2,1);border:1px solid transparent;position:relative;overflow:hidden}
.pos-card::before{content:'';position:absolute;left:0;top:15%;height:70%;width:3px;border-radius:0 3px 3px 0;background:var(--pos-color);opacity:0;transition:opacity .2s}
.pos-card:hover{background:var(--primary-light);border-color:var(--border)}
.pos-card:hover::before{opacity:1}
.pos-card.active{background:var(--primary-light);border-color:rgba(79,110,247,.2)}
.pos-card.active::before{opacity:1}
.pos-icon{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.pos-info{flex:1;min-width:0}
.pos-name{font-size:11px;font-weight:600;color:var(--text);margin-bottom:3px}
.pos-bar{height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.pos-bar-fill{height:100%;border-radius:2px;background:var(--pos-color);transition:width .6s cubic-bezier(.4,0,.2,1);width:0%}
.pos-count{font-size:10px;font-weight:700;color:var(--text3);background:var(--bg);padding:1px 6px;border-radius:8px;min-width:20px;text-align:center;flex-shrink:0;transition:all .2s}
.pos-card:hover .pos-count{background:var(--primary-light);color:var(--primary)}
.pos-card.active .pos-count{background:rgba(79,110,247,.15);color:var(--primary)}

/* Company Color Dot */
.comp-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}

/* Org Tree (borrowed from 人才鱼塘) */
.org-tree{display:flex;flex-direction:column;align-items:center;gap:0}
.org-line-v{width:2px;background:var(--border);margin:0 auto}
.org-line-h{position:relative;height:2px;background:var(--border);margin:0 60px}
.org-line-h::before{content:'';position:absolute;left:0;top:-4px;width:2px;height:10px;background:var(--border)}
.org-line-h::after{content:'';position:absolute;right:0;top:-4px;width:2px;height:10px;background:var(--border)}
.org-sub-tree{display:flex;flex-direction:column;align-items:center}
.org-sub-depts{display:flex;flex-direction:column;gap:6px;width:100%}
.org-sub-card{background:var(--card-hover);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:11px;transition:all .2s}
.org-sub-card:hover{border-color:var(--primary)}
.org-sub-name{font-weight:600;color:var(--text);margin-bottom:2px;font-size:11px}
.org-sub-head{color:var(--text2);font-size:10px}
.org-sub-tag{color:var(--primary);font-size:9px;margin-top:2px}
.org-card-top{background:var(--primary);border-color:var(--primary);min-width:200px}
.org-card-top .org-card-title{color:rgba(255,255,255,.8);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.org-card-top .org-card-name{color:#fff;font-size:16px;font-weight:600;margin:4px 0}
.org-card-top .org-card-note{color:rgba(255,255,255,.7);font-size:10px}
.org-level{display:flex;gap:16px;justify-content:center}

/* Insight Card (borrowed from 人才鱼塘) */
.insight-card{background:var(--card-hover);border:1px solid var(--border);border-radius:8px;padding:16px}
.insight-card .insight-title{font-size:12px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.insight-card .insight-item{font-size:12px;color:var(--text2);padding:3px 0;line-height:1.5}
.progress-row{margin-bottom:8px}
.progress-row .progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.progress-row .progress-label span:first-child{font-weight:500}
.progress-row .progress-label span:last-child{color:var(--text2)}
.progress-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Departed Talent Card */
.dept-card{padding:8px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.dept-card:hover{border-color:var(--orange);background:var(--orange-light)}
.dept-card .dept-name{font-size:12px;font-weight:500}
.dept-card .dept-note{font-size:11px;color:var(--text2);margin-top:2px}

/* Pipeline View */
.pipeline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.pipeline-group{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;transition:all .25s}
.pipeline-group:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.pipeline-group .pg-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pipeline-group .pg-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.pipeline-group .pg-count{font-size:11px;color:var(--text3)}
.pipeline-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;transition:background .15s}
.pipeline-item:last-child{border-bottom:none}
.pipeline-item:hover{background:var(--primary-light);margin:0 -8px;padding:8px;border-radius:var(--radius)}
.pipeline-item .pi-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.pipeline-item .pi-info{flex:1;min-width:0}
.pipeline-item .pi-name{font-weight:600;font-size:12px}
.pipeline-item .pi-dept{font-size:10px;color:var(--text2)}
.pipeline-item .pi-info-tag{font-size:9px;color:var(--text3);margin-top:1px}
.tag-pipeline{display:inline-block;padding:2px 8px;border-radius:4px;font-size:9px;font-weight:600}
.tag-pipeline.green{background:rgba(16,185,129,.12);color:var(--green)}
.tag-pipeline.yellow{background:rgba(245,158,11,.12);color:var(--orange)}
.tag-pipeline.blue{background:rgba(79,110,247,.12);color:var(--primary)}
.tag-pipeline.red{background:rgba(239,68,68,.12);color:var(--red)}
.tag-pipeline.gray{background:rgba(148,163,184,.12);color:var(--text3)}

@media(max-width:768px){
  .sidebar{width:56px;transition:width .3s}
  .sidebar .nav-item span:not(.icon):not(.count){display:none}
  .sidebar-header .logo span{display:none}
  .sidebar-footer{display:none}
  .nav-section{display:none}
  .pos-grid{display:none}
  .detail-panel{width:100%}
  .topbar{padding:10px 16px}
  .topbar-badge{display:none}
  .search-box{max-width:none}
  .card-view{grid-template-columns:1fr;padding:10px 12px}
  .candidate-card{padding:12px}
  .modal{width:95vw;max-height:90vh}
  .form-grid{grid-template-columns:1fr}
  .gradient-bg .orb{opacity:.06}
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .filter-bar{gap:6px}
  .filter-btn{padding:5px 10px;font-size:11px}
  .pipeline-grid{grid-template-columns:1fr}
  .org-level{flex-wrap:wrap;gap:8px}
}
</style>
</head>
<body>
<div class="gradient-bg"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header"><div class="logo"><span>AI</span> 人才库</div></div>
    <div class="sidebar-nav" id="sidebar-nav">
      <div class="nav-item active" data-nav="overview"><span class="icon">📊</span><span>总览</span></div>
      <div class="nav-section">人才库</div>
      <div class="nav-item" data-nav="all"><span class="icon">👥</span><span>全部人才</span><span class="count" id="nav-all-count">0</span></div>
      <div class="nav-item" data-nav="starred"><span class="icon">📌</span><span>已收藏</span><span class="count" id="nav-starred-count">0</span></div>
      <div class="nav-section">按岗位</div>
      <div class="pos-grid" id="pos-grid">
        <div class="pos-card" data-nav="pos-tech" style="--pos-color:var(--primary)"><div class="pos-icon">💻</div><div class="pos-info"><div class="pos-name">技术</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-tech"></div></div></div><div class="pos-count" id="nav-pos-tech-count">0</div></div>
        <div class="pos-card" data-nav="pos-product" style="--pos-color:var(--green)"><div class="pos-icon">📋</div><div class="pos-info"><div class="pos-name">产品</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-product"></div></div></div><div class="pos-count" id="nav-pos-product-count">0</div></div>
        <div class="pos-card" data-nav="pos-design" style="--pos-color:var(--purple)"><div class="pos-icon">🎨</div><div class="pos-info"><div class="pos-name">设计</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-design"></div></div></div><div class="pos-count" id="nav-pos-design-count">0</div></div>
        <div class="pos-card" data-nav="pos-ops" style="--pos-color:var(--orange)"><div class="pos-icon">⚙️</div><div class="pos-info"><div class="pos-name">运营</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-ops"></div></div></div><div class="pos-count" id="nav-pos-ops-count">0</div></div>
        <div class="pos-card" data-nav="pos-marketing" style="--pos-color:var(--cyan)"><div class="pos-icon">📢</div><div class="pos-info"><div class="pos-name">市场</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-marketing"></div></div></div><div class="pos-count" id="nav-pos-marketing-count">0</div></div>
        <div class="pos-card" data-nav="pos-leadership" style="--pos-color:var(--red)"><div class="pos-icon">👔</div><div class="pos-info"><div class="pos-name">管理层</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-leadership"></div></div></div><div class="pos-count" id="nav-pos-leadership-count">0</div></div>
        <div class="pos-card" data-nav="pos-other" style="--pos-color:var(--text3)"><div class="pos-icon">📁</div><div class="pos-info"><div class="pos-name">其他</div><div class="pos-bar"><div class="pos-bar-fill" id="pos-bar-other"></div></div></div><div class="pos-count" id="nav-pos-other-count">0</div></div>
      </div>
      <div class="nav-section">按公司</div>
      <div id="nav-companies"></div>
      <div class="nav-section">人才状态</div>
      <div class="nav-item" data-nav="st-look-good"><span class="icon">🌟</span><span>看机会+优质</span><span class="count" id="nav-st-look-good-count">0</span></div>
      <div class="nav-item" data-nav="st-look-normal"><span class="icon">👀</span><span>看机会+普通</span><span class="count" id="nav-st-look-normal-count">0</span></div>
      <div class="nav-item" data-nav="st-nolook-good"><span class="icon">🔒</span><span>不看+优质</span><span class="count" id="nav-st-nolook-good-count">0</span></div>
      <div class="nav-item" data-nav="st-pending"><span class="icon">❓</span><span>待确认</span><span class="count" id="nav-st-pending-count">0</span></div>
      <div class="nav-section">链接关系</div>
      <div class="nav-item" data-nav="link-yes"><span class="icon">🔗</span><span>有过链接</span><span class="count" id="nav-link-yes-count">0</span></div>
      <div class="nav-item" data-nav="link-no"><span class="icon">○</span><span>未链接</span><span class="count" id="nav-link-no-count">0</span></div>
      <div class="nav-section">来源</div>
      <div class="nav-item" data-nav="src-headhunter"><span class="icon">🔍</span><span>猎头推荐</span><span class="count" id="nav-src-headhunter-count">0</span></div>
      <div class="nav-item" data-nav="src-referral"><span class="icon">🤝</span><span>内部推荐</span><span class="count" id="nav-src-referral-count">0</span></div>
      <div class="nav-item" data-nav="src-active"><span class="icon">📨</span><span>主动投递</span><span class="count" id="nav-src-active-count">0</span></div>
      <div class="nav-section">分析</div>
      <div class="nav-item" data-nav="pipeline"><span class="icon">🔀</span><span>挖猎管线</span></div>
    </div>
    <div class="sidebar-footer"><span class="ver">v4.0</span> AI人才库</div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-badge"><span class="pulse"></span> AI 人才库 v4.0</div>
      <div class="search-box"><span class="icon">🔍</span><input type="text" id="search" placeholder="搜索姓名、公司、技能、职位..."></div>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" id="btn-overview">📊 总览</button>
        <button class="btn btn-outline btn-sm" id="btn-export">导出</button>
        <button class="btn btn-outline btn-sm" id="btn-theme" title="切换主题">☀️</button>
        <button class="btn btn-primary btn-sm" id="btn-add">+ 添加候选人</button>
      </div>
    </div>
    <div class="content">
      <div class="list-area" id="list-area">

</div>

<!-- Modal: Add Candidate (with upload) -->
<div class="modal-overlay" id="modal-add">
  <div class="modal" style="width:640px">
    <div class="modal-header"><h3 id="modal-title">添加候选人</h3><button class="modal-close" id="modal-add-close">✕</button></div>
    <div class="modal-body">
      <div class="upload-zone" id="upload-zone" style="margin-bottom:14px">
        <div style="font-size:32px;margin-bottom:8px;opacity:.8">📎</div>
        <div style="font-size:13px;font-weight:600;margin-bottom:4px">上传简历自动解析（可选）</div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:8px">点击或拖拽文件，自动提取姓名、公司、职位、技能等</div>
        <div style="display:flex;gap:6px;justify-content:center">
          <span style="padding:2px 8px;border-radius:8px;font-size:9px;background:var(--bg);color:var(--text2);border:1px solid var(--border)">PDF</span>
          <span style="padding:2px 8px;border-radius:8px;font-size:9px;background:var(--bg);color:var(--text2);border:1px solid var(--border)">DOC</span>
          <span style="padding:2px 8px;border-radius:8px;font-size:9px;background:var(--bg);color:var(--text2);border:1px solid var(--border)">DOCX</span>
        </div>
        <input type="file" id="file-input" multiple accept=".pdf,.doc,.docx" style="display:none">
      </div>
      <div id="upload-file-list"></div>
      <div id="parse-status"></div>
      <div class="form-grid" style="margin-top:14px">
        <div class="form-group"><label>姓名 *</label><input id="f-name" placeholder="候选人姓名"></div>
        <div class="form-group"><label>年龄</label><input type="number" id="f-age" placeholder="30" min="18" max="65"></div>
        <div class="form-group"><label>当前公司 *</label><input id="f-company" placeholder="百度Apollo"></div>
        <div class="form-group"><label>当前职位 *</label><input id="f-title" placeholder="高级算法工程师"></div>

// ===== State =====

  { type:'市场负责人', name:'周磊', dept:'数字营销', level:'M2', status:'pending', info:'腾讯广告商业化，效果广告专家' },

  { type:'设计负责人', name:'黄芳', dept:'UX设计', level:'P6', status:'pending', info:'蚂蚁集团UX负责人，B端设计体系' },
  { type:'运营负责人', name:'林杰', dept:'用户运营', level:'M2', status:'active', info:'美团用户增长负责人，DAU从0到1经验' },
  { type:'运营负责人', name:'何婷', dept:'内容运营', level:'M2', status:'hired', info:'已入职，负责社区内容生态' },
  { type:'运营负责人', name:'罗伟', dept:'活动运营', level:'M1', status:'rejected', info:'经验偏执行层面，缺少策略能力' }
];
var PIPELINE_STATUS = {

  tracking:{label:'长期跟进',color:'blue'}, hired:{label:'已入职',color:'green'},
  rejected:{label:'面试未通过',color:'red'}, declined:{label:'地点不考虑',color:'gray'}
};

// ===== Departed Talent (borrowed from 人才鱼塘) =====
var DEPARTED_TALENT = [
  { name:'贾净东', title:'原vivo品牌领域负责人', company:'vivo', note:'现担任安克CMO', date:'2024' },
  { name:'吕婷', title:'品牌战略部总监', company:'理想', note:'2022.8离开去长安深蓝，2018-2021宝马资深市场数字化营销经理', date:'2022' },
  { name:'刘涛', title:'高级总监', company:'理想', note:'2025.4加入奇瑞星途负责市场部，前汽车之家总编', date:'2025' },
  { name:'王雅君', title:'媒介投放总监', company:'理想', note:'2022.10离开加入自如，理想初创团队成员，2014-2017北京奔驰数字营销经理', date:'2022' },
  { name:'翟元', title:'内容和公关总监', company:'理想', note:'前汽车之家主编，理想所有对外公关稿件均为翟元亲自执笔', date:'2023' }
];

// ===== Org Insights (borrowed from 人才鱼塘) =====
var ORG_INSIGHTS = {
  '腾讯': {
    insights: [
      '技术驱动：AI大模型、混元为核心战略方向',
      '组织扁平：事业群制，决策链路短',
      '人才流动：内部活水计划，跨BG轮岗常见',
      '校招为主：核心岗位以校招培养为主',
      '薪酬竞争力：总包行业领先，期权比例高'
    ],
    progress: [
      { label:'技术岗位', done:3, total:5 },
      { label:'产品岗位', done:1, total:3 },
      { label:'市场岗位', done:2, total:4 }
    ]
  }
};

// ===== Helpers =====
var COLORS = ['#4f6ef7','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#14b8a6'];
function avatarColor(id) { return COLORS[id % COLORS.length]; }
function sourceTagColor(s) { return {'猎头推荐':'tag-purple','主动投递':'tag-blue','内部推荐':'tag-green','LinkedIn':'tag-cyan','Boss直聘':'tag-orange','猎聘':'tag-orange','脉脉':'tag-cyan'}[s] || 'tag-blue'; }
function riskTag(r) { return r === 'high' ? '<span class="tag tag-red">高风险</span>' : r === 'medium' ? '<span class="tag tag-orange">中风险</span>' : '<span class="tag tag-green">低风险</span>'; }
function statusDot(s) { return s === 'active' ? '<span class="status-dot status-active"></span>活跃' : s === 'warm' ? '<span class="status-dot" style="background:var(--orange)"></span>保温' : '<span class="status-dot status-inactive"></span>不活跃'; }
function matchColor(m) { return m >= 80 ? 'var(--green)' : m >= 60 ? 'var(--orange)' : 'var(--red)'; }
function today() { return new Date().toISOString().slice(0, 10); }
function daysUntil(dateStr) { return Math.ceil((new Date(dateStr) - new Date()) / 86400000); }
function showToast(msg) { var el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show'); setTimeout(function() { el.classList.remove('show'); }, 2500); }
function findDuplicate(name, company) {
  if (!name || !company) return null;
  name = name.trim().toLowerCase(); company = company.trim().toLowerCase();
  return candidates.find(function(c) { return c.name.toLowerCase() === name && c.company.toLowerCase() === company; });
}

// ===== Position classification =====
function classifyPosition(c) {
  var t = (c.title + ' ' + c.skills.join(' ')).toLowerCase();
  if (/总监|vp|负责人|head|经理|director|manager|lead|chief|总裁|副总/.test(t)) return 'pos-leadership';
  if (/ engineer|开发|工程师|架构师|算法|研发|后端|前端|全栈|测试|运维|devops| architect|python|java|c\+\+|go |node|react|vue|flutter|tensorflow|pytorch|机器学习|深度学习|自动驾驶|感知/.test(t)) return 'pos-tech';
  if (/产品|product|pm /.test(t)) return 'pos-product';
  if (/设计|design|ui|ux|交互|视觉|figma|sketch|photoshop/.test(t)) return 'pos-design';
  if (/运营|operation|增长|用户增长|内容运营|社区运营|活动运营/.test(t)) return 'pos-ops';
  if (/市场|marketing|品牌|公关|pr |推广|传播|brand/.test(t)) return 'pos-marketing';
  return 'pos-other';
}

// ===== Filtering =====
function getFiltered() {
  return candidates.filter(function(c) {
    if (currentNav === 'starred' && !c.starred) return false;
    // Position
    if (currentNav.startsWith('pos-')) {
      if (classifyPosition(c) !== currentNav) return false;
    }
    // Company (dynamic, prefix: comp-)
    if (currentNav.startsWith('comp-')) {
      var compName = currentNav.substring(4);
      if (c.company !== compName) return false;
    }
    // Talent status
    if (currentNav === 'st-look-good') { if (c.opportunity !== '看机会' || c.quality !== '优质') return false; }
    if (currentNav === 'st-look-normal') { if (c.opportunity !== '看机会' || c.quality !== '普通') return false; }
    if (currentNav === 'st-nolook-good') { if (c.opportunity !== '不看机会' || c.quality !== '优质') return false; }
    if (currentNav === 'st-pending') { if (c.opportunity !== '待确认' && c.quality !== '待评估') return false; }
    // Connection
    if (currentNav === 'link-yes' && !c.connected) return false;
    if (currentNav === 'link-no' && c.connected) return false;
    // Source
    if (currentNav === 'src-headhunter' && c.source !== '猎头推荐') return false;
    if (currentNav === 'src-referral' && c.source !== '内部推荐') return false;
    if (currentNav === 'src-active' && c.source !== '主动投递') return false;
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      var text = (c.name + ' ' + c.company + ' ' + c.title + ' ' + c.edu + ' ' + c.city + ' ' + c.source + ' ' + c.skills.join(' ') + ' ' + c.tags.join(' ')).toLowerCase();
      if (text.indexOf(q) === -1) return false;
    }
    return true;
  });
}

// ===== Render List =====
function renderList() {
  var filtered = getFiltered();
  // Update counts
  document.getElementById('nav-all-count').textContent = candidates.length;
  document.getElementById('nav-starred-count').textContent = candidates.filter(function(c) { return c.starred; }).length;
  // Position counts + progress bars
  var posKeys = ['tech','product','design','ops','marketing','leadership','other'];
  var posCounts = posKeys.map(function(k) { return candidates.filter(function(c) { return classifyPosition(c) === 'pos-' + k; }).length; });
  var posMax = Math.max.apply(null, posCounts.concat([1]));
  posKeys.forEach(function(k, i) {
    var count = posCounts[i];
    document.getElementById('nav-pos-' + k + '-count').textContent = count;
    var bar = document.getElementById('pos-bar-' + k);
    if (bar) bar.style.width = (count / posMax * 100) + '%';
  });
  // Update active state for pos-cards
  document.querySelectorAll('.pos-card').forEach(function(el) {
    el.classList.toggle('active', el.dataset.nav === currentNav);
  });
  // Talent status counts
  document.getElementById('nav-st-look-good-count').textContent = candidates.filter(function(c) { return c.opportunity === '看机会' && c.quality === '优质'; }).length;
  document.getElementById('nav-st-look-normal-count').textContent = candidates.filter(function(c) { return c.opportunity === '看机会' && c.quality === '普通'; }).length;
  document.getElementById('nav-st-nolook-good-count').textContent = candidates.filter(function(c) { return c.opportunity === '不看机会' && c.quality === '优质'; }).length;
  document.getElementById('nav-st-pending-count').textContent = candidates.filter(function(c) { return c.opportunity === '待确认' || c.quality === '待评估'; }).length;
  // Connection counts
  document.getElementById('nav-link-yes-count').textContent = candidates.filter(function(c) { return c.connected; }).length;
  document.getElementById('nav-link-no-count').textContent = candidates.filter(function(c) { return !c.connected; }).length;
  // Source counts
  document.getElementById('nav-src-headhunter-count').textContent = candidates.filter(function(c) { return c.source === '猎头推荐'; }).length;
  document.getElementById('nav-src-referral-count').textContent = candidates.filter(function(c) { return c.source === '内部推荐'; }).length;
  document.getElementById('nav-src-active-count').textContent = candidates.filter(function(c) { return c.source === '主动投递'; }).length;
  // Dynamic company nav
  var companyMap = {};
  candidates.forEach(function(c) { if (c.company) companyMap[c.company] = (companyMap[c.company] || 0) + 1; });
  var companies = Object.keys(companyMap).sort();
  var compHtml = companies.map(function(name) {
    var active = currentNav === 'comp-' + name ? ' active' : '';
    return '<div class="nav-item' + active + '" data-nav="comp-' + name + '"><span class="comp-dot" style="background:' + getCompanyColor(name) + ';margin-left:2px"></span><span>' + name + '</span><span class="count">' + companyMap[name] + '</span></div>';
  }).join('');
  document.getElementById('nav-companies').innerHTML = compHtml || '<div style="padding:4px 12px;font-size:10px;color:var(--text3)">暂无数据</div>';
  document.getElementById('list-count').textContent = '共 ' + filtered.length + ' 人';

  if (!filtered.length) {
    document.getElementById('candidate-list').innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>未找到匹配的候选人</p></div>';
    return;
  }
  // Mini stats row above list (when not filtering by specific category)
  var statsHtml = '';
  if (currentNav === 'all' || currentNav === 'starred') {
    var aCount = candidates.filter(function(c) { return c.status === 'active'; }).length;
    var wCount = candidates.filter(function(c) { return c.status === 'warm'; }).length;
    var sCount = candidates.filter(function(c) { return c.starred; }).length;
    statsHtml = '<div class="stats-row" style="margin:0 20px 12px">';
    statsHtml += '<div class="stat-card"><div class="label">总人才</div><div class="value accent" style="font-size:22px">' + candidates.length + '</div></div>';
    statsHtml += '<div class="stat-card"><div class="label">活跃</div><div class="value green" style="font-size:22px">' + aCount + '</div></div>';
    statsHtml += '<div class="stat-card"><div class="label">保温</div><div class="value orange" style="font-size:22px">' + wCount + '</div></div>';
    statsHtml += '<div class="stat-card"><div class="label">已收藏</div><div class="value blue" style="font-size:22px">' + sCount + '</div></div>';
    statsHtml += '</div>';
  }
  if (viewMode === 'table') renderTable(filtered); else renderCards(filtered);
  // Prepend stats before the rendered list
  if (statsHtml) {
    var listEl = document.getElementById('candidate-list');
    listEl.insertAdjacentHTML('afterbegin', statsHtml);
  }
}

function oppTag(o) { return o === '看机会' ? '<span class="tag tag-green">看机会</span>' : o === '不看机会' ? '<span class="tag" style="background:#f1f5f9;color:#94a3b8">不看</span>' : '<span class="tag tag-orange">待确认</span>'; }
function qualTag(q) { return q === '优质' ? '<span class="tag" style="background:rgba(245,158,11,.12);color:#d97706">优质</span>' : q === '普通' ? '<span class="tag tag-blue">普通</span>' : '<span class="tag" style="background:#f1f5f9;color:#94a3b8">待评估</span>'; }
function connIcon(v) { return v ? '<span style="color:var(--green);font-size:13px" title="有过链接">🔗</span>' : '<span style="color:var(--text3);font-size:11px" title="未链接">○</span>'; }

function renderTable(list) {
  var h = '<table class="candidate-table"><thead><tr><th>候选人</th><th>职位</th><th>看机会</th><th>链接</th><th>来源</th><th>技能</th><th>保温</th><th></th></tr></thead><tbody>';
  list.forEach(function(c) {
    var remDays = daysUntil(c.reminderDate);
    var remHtml = remDays <= 0 ? '<span style="background:var(--red-light);color:var(--red);padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600">需联系</span>' : remDays <= 7 ? '<span style="background:var(--orange-light);color:var(--orange);padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600">' + remDays + '天</span>' : '<span style="font-size:10px;color:var(--text3)">' + remDays + '天</span>';
    h += '<tr data-id="' + c.id + '">';
    h += '<td><div class="name-cell"><div class="avatar" style="background:' + avatarColor(c.id) + '">' + c.name[0] + '</div><div><div class="name">' + c.name + '</div><div class="company"><span class="comp-dot" style="background:' + getCompanyColor(c.company) + ';width:6px;height:6px;margin-right:3px"></span>' + c.company + '</div></div></div></td>';
    h += '<td style="font-size:11px">' + c.title + '</td>';
    h += '<td>' + oppTag(c.opportunity) + '</td>';
    h += '<td>' + connIcon(c.connected) + '</td>';
    h += '<td><span class="tag ' + sourceTagColor(c.source) + '">' + c.source + '</span></td>';
    h += '<td><div class="tags">' + c.skills.slice(0, 2).map(function(s) { return '<span class="tag tag-blue">' + s + '</span>'; }).join('') + '</div></td>';
    h += '<td>' + remHtml + '</td>';
    h += '<td><button class="btn btn-sm btn-outline" data-action="star" data-id="' + c.id + '">' + (c.starred ? '★' : '☆') + '</button> ';
    h += '<button class="btn btn-sm btn-outline" data-action="edit" data-id="' + c.id + '">编辑</button> ';
    h += '<button class="btn btn-sm btn-danger" data-action="delete" data-id="' + c.id + '">删除</button></td></tr>';
  });
  h += '</tbody></table>';
  document.getElementById('candidate-list').innerHTML = h;
}

function renderCards(list) {
  var h = '<div class="card-view">';
  list.forEach(function(c) {
    var posKey = classifyPosition(c);
    var posLabels = {'pos-tech':'技术','pos-product':'产品','pos-design':'设计','pos-ops':'运营','pos-marketing':'市场','pos-leadership':'管理层','pos-other':'其他'};
    // Build bio text from tags or basic info

// Filter overview by position (uses filter-btn pattern)
function filterOverviewPos(pos, btn) {
  document.querySelectorAll('.filter-bar .filter-btn').forEach(function(b) { b.classList.remove('active'); });

      h += '<div class="pipeline-item">';

  });
  h += '</div>';

  el.innerHTML = h;

// ===== Actions =====
function toggleStar(id) {
  var c = candidates.find(function(x) { return x.id === id; });
  if (!c) return;
  c.starred = !c.starred;
  saveData();
  showToast(c.starred ? '已收藏 ' + c.name : '已取消收藏 ' + c.name);
  renderList();
}

function toggleStatus(id) {
  var c = candidates.find(function(x) { return x.id === id; });
  if (!c) return;
  c.status = c.status === 'active' ? 'warm' : 'active';
  saveData();
  showToast(c.name + ' 状态已更新为 ' + (c.status === 'active' ? '活跃' : '保温'));
  renderList();
}

function recordContact(id) {
  var c = candidates.find(function(x) { return x.id === id; });
  if (!c) return;
  var action = prompt('触达方式（邮件/电话/微信/短信）：', '邮件');
  if (!action) return;
  var result = prompt('触达结果：', '已发送');
  if (!result) return;
  c.activationHistory.push({ time: today(), action: action, result: result });
  c.status = 'warm';
  saveData();
  showToast('已记录 ' + c.name + ' 的触达：' + action);
  renderList();
  showDetail(id);
}

function deleteCandidate(id) {
  var c = candidates.find(function(x) { return x.id === id; });
  if (!c) return;
  deleteTargetId = id;
  document.getElementById('delete-msg').textContent = '确定要删除候选人 "' + c.name + '"（' + c.company + '）吗？此操作不可撤销。';
  document.getElementById('modal-delete').classList.add('open');
}

function confirmDelete() {
  if (deleteTargetId === null) return;
  var idx = candidates.findIndex(function(c) { return c.id === deleteTargetId; });
  if (idx !== -1) {
    var name = candidates[idx].name;
    candidates.splice(idx, 1);
    saveData();
    showToast('已删除 ' + name);
  }
  document.getElementById('modal-delete').classList.remove('open');
  deleteTargetId = null;
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('detail-backdrop').classList.remove('open');
  renderList();
}

function exportList() {
  var filtered = getFiltered();
  var csv = '姓名,公司,职位,学历,经验,城市,薪资,来源,匹配度,看机会,质量,链接,状态,风险,技能,标签\n';
  filtered.forEach(function(c) {
    csv += '"' + c.name + '","' + c.company + '","' + c.title + '","' + c.edu + '",' + c.exp + ',"' + c.city + '",' + c.salary + ',"' + c.source + '",' + c.match + ',"' + (c.opportunity||'') + '","' + (c.quality||'') + '",' + (c.connected ? '是' : '否') + ',"' + c.status + '","' + c.risk + '","' + c.skills.join(';') + '","' + c.tags.join(';') + '"\n';
  });
  var blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  var link = document.createElement('a');
  link.href = URL.createObjectURL(blob);

}

function saveForm() {
  var name = document.getElementById('f-name').value.trim();
  var company = document.getElementById('f-company').value.trim();
  var title = document.getElementById('f-title').value.trim();
  if (!name || !company || !title) {
    showToast('请填写姓名、公司和职位');
    return;
  }
  // Duplicate check
  if (editingId === null) {
    var dup = findDuplicate(name, company);
    if (dup) {
      var proceed = confirm('发现重复候选人：' + dup.name + '（' + dup.company + ' · ' + dup.title + '），是否仍要添加？');
      if (!proceed) return;
    }
  }

  var age = parseInt(document.getElementById('f-age').value) || 30;
  var edu = document.getElementById('f-edu').value;
  var exp = parseInt(document.getElementById('f-exp').value) || 5;
  var city = document.getElementById('f-city').value;
  var salary = parseInt(document.getElementById('f-salary').value) || 0;
  var match = parseInt(document.getElementById('f-match').value) || 0;
  var source = document.getElementById('f-source').value;
  var opportunity = document.getElementById('f-opportunity').value;
  var quality = document.getElementById('f-quality').value;
  var connected = document.getElementById('f-connected').checked;

  if (editingId !== null) {
    // Edit existing
    var c = candidates.find(function(x) { return x.id === editingId; });
    if (c) {
      c.name = name; c.age = age; c.company = company; c.title = title;
      c.edu = edu; c.exp = exp; c.city = city; c.salary = salary;
      c.match = match; c.source = source;
      c.opportunity = opportunity; c.quality = quality; c.connected = connected;
      c.skills = formSkills.slice();
      c.tags = formTags.slice();
      saveData();
      showToast('已更新 ' + name);
    }
  } else {
    // Add new
    var newC = {
      id: nextId++, name: name, age: age, company: company, title: title,
      edu: edu, exp: exp, city: city, salary: salary, source: source,
      skills: formSkills.slice(), tags: formTags.slice(),
      match: match, risk: 'low', status: 'active', starred: false,
      opportunity: opportunity, quality: quality, connected: connected,
      reminderDate: new Date(Date.now() + 30 * 86400000).toISOString().slice(0, 10),
      activationHistory: [],
      timeline: [{ year: '至今', role: title, company: company }]
    };
    candidates.push(newC);
    // Attach uploaded file info
    if (pendingUploadFile) {
      newC.tags.push('简历: ' + pendingUploadFile.name);
      pendingUploadFile = null;
    }
    saveData();
    showToast('已添加 ' + name);
  }

  document.getElementById('modal-add').classList.remove('open');
  renderList();
}

function renderFormTags(wrapId, inputId, arr) {
  var wrap = document.getElementById(wrapId);
  var input = document.getElementById(inputId);
  wrap.querySelectorAll('.tag').forEach(function(t) { t.remove(); });
  arr.forEach(function(t, i) {
    var tag = document.createElement('span');
    tag.className = 'tag';
    tag.innerHTML = t + ' <span class="rm" data-i="' + i + '">✕</span>';
    tag.querySelector('.rm').addEventListener('click', function(e) {
      e.stopPropagation();
      arr.splice(parseInt(this.dataset.i), 1);
      renderFormTags(wrapId, inputId, arr);
    });
    wrap.insertBefore(tag, input);
  });
}

  if (target) {
    e.stopPropagation();
    var action = target.dataset.action;

    if (action === 'star') toggleStar(id);
    else if (action === 'edit') openEditModal(id);
    else if (action === 'delete') deleteCandidate(id);
    else if (action === 'toggle-status') toggleStatus(id);
    else if (action === 'toggle-star-detail') { toggleStar(id); showDetail(id); }
    else if (action === 'record-contact') recordContact(id);
    else if (action === 'overview-open') showDetail(id);
    return;
  }
  if (card) {
    showDetail(parseInt(card.dataset.id));
    return;
  }
  if (row) {
    showDetail(parseInt(row.dataset.id));
    return;
  }
  if (navItem) {
    currentNav = navItem.dataset.nav;
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
    navItem.classList.add('active');
    var titles = {all:'全部人才',starred:'已收藏','pos-tech':'技术','pos-product':'产品','pos-design':'设计','pos-ops':'运营','pos-marketing':'市场','pos-leadership':'管理层','pos-other':'其他','st-look-good':'看机会+优质','st-look-normal':'看机会+普通','st-nolook-good':'不看+优质','st-pending':'待确认','link-yes':'有过链接','link-no':'未链接','src-headhunter':'猎头推荐','src-referral':'内部推荐','src-active':'主动投递','overview':'总览','pipeline':'挖猎管线'};
    var title = titles[currentNav];

    document.getElementById('list-area').querySelector('.list-header').style.display = isSpecialView ? 'none' : '';
    document.getElementById('candidate-list').style.display = isSpecialView ? 'none' : '';
    document.getElementById('overview-area').className = isSpecialView ? 'active' : '';
    document.querySelector('.view-toggle').style.display = isSpecialView ? 'none' : '';

    posCard.classList.add('active');
    document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });

    document.querySelectorAll('.view-toggle button').forEach(function(b) { b.classList.remove('active'); });

var uploadedFiles = [];
var parsedResults = []; // {file, rawText, extracted}

function handleUploadFiles(files) {
  for (var i = 0; i < files.length; i++) {
    var f = files[i];
    var ext = f.name.split('.').pop().toLowerCase();
    if (['pdf', 'doc', 'docx'].indexOf(ext) === -1) {
      showToast('不支持的格式: ' + ext);
      continue;
    }
    uploadedFiles.push(f);
    parsedResults.push({ file: f, rawText: '', extracted: null, status: 'pending' });
  }
  renderUploadList();
  // Auto-parse all files
  parseAllFiles();
}

function renderUploadList() {
  var el = document.getElementById('upload-file-list');
  if (!parsedResults.length) { el.innerHTML = ''; return; }
  el.innerHTML = parsedResults.map(function(r, i) {
    var f = r.file;
    var sz = f.size > 1048576 ? (f.size / 1048576).toFixed(1) + 'MB' : (f.size / 1024).toFixed(0) + 'KB';
    var icon = f.name.endsWith('.pdf') ? '📕' : '📘';
    var statusHtml = '';
    if (r.status === 'parsing') statusHtml = '<div class="parse-status"><div class="spinner"></div><span>正在解析...</span></div>';
    else if (r.status === 'done') statusHtml = '<div class="parse-status"><span class="done">✓ 解析完成</span></div>';
    else if (r.status === 'error') statusHtml = '<div class="parse-status"><span class="fail">✕ ' + (r.error || '解析失败') + '</span></div>';
    return '<div class="upload-file" style="flex-wrap:wrap"><span>' + icon + '</span><span class="fname">' + f.name + '</span><span class="fsize">' + sz + '</span><button class="fremove" data-i="' + i + '">✕</button>' + statusHtml + '</div>';
  }).join('');
  el.querySelectorAll('.fremove').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var idx = parseInt(this.dataset.i);
      uploadedFiles.splice(idx, 1);
      parsedResults.splice(idx, 1);
      renderUploadList();
    });
  });
}

// ===== File Text Extraction =====
function extractTextFromPDF(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      var typedarray = new Uint8Array(e.target.result);
      if (typeof pdfjsLib === 'undefined') { reject(new Error('PDF.js 未加载')); return; }
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      pdfjsLib.getDocument(typedarray).promise.then(function(pdf) {
        var texts = [];
        var pending = pdf.numPages;
        for (var p = 1; p <= pdf.numPages; p++) {
          pdf.getPage(p).then(function(page) {
            page.getTextContent().then(function(content) {
              content.items.forEach(function(item) { texts.push(item.str); });
              pending--;
              if (pending === 0) resolve(texts.join('\n'));
            });
          });
        }
      }).catch(reject);
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function extractTextFromDOCX(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function(e) {
      mammoth.extractRawText({ arrayBuffer: e.target.result })
        .then(function(result) { resolve(result.value); })
        .catch(reject);
    };
    reader.onerror = reject;
    reader.readAsArrayBuffer(file);
  });
}

function extractText(file) {
  var ext = file.name.split('.').pop().toLowerCase();
  if (ext === 'pdf') return extractTextFromPDF(file);
  if (ext === 'docx' || ext === 'doc') return extractTextFromDOCX(file);
  return Promise.reject(new Error('不支持的格式'));
}

// ===== Resume Parsing (from raw text) =====
function parseResumeText(text) {
  var result = {
    name: '', phone: '', email: '', age: '', gender: '',
    city: '', edu: '', university: '', exp: '', title: '', company: '',
    skills: [], salary: '', rawText: text
  };
  if (!text) return result;
  var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(Boolean);

  // Phone
  var phoneMatch = text.match(/1[3-9]\d{9}/);
  if (phoneMatch) result.phone = phoneMatch[0];

  // Email
  var emailMatch = text.match(/[\w.-]+@[\w.-]+\.\w{2,}/);
  if (emailMatch) result.email = emailMatch[0];

  // Gender
  if (/男/.test(text.substring(0, 800))) result.gender = '男';
  else if (/女/.test(text.substring(0, 800))) result.gender = '女';

  // Age
  var ageMatch = text.match(/(?:年龄|Age)[：:\s]*(\d{2})/i) || text.match(/(\d{2})\s*岁/);
  if (ageMatch) result.age = ageMatch[1];

  // ===== Name (improved) =====
  // Try "姓名：XXX" pattern first
  var nameLabel = text.match(/姓名[：:\s]*([^\s,，。\d]{2,4})/);
  if (nameLabel) {
    result.name = nameLabel[1];
  } else {
    // Look for a short pure-Chinese line in the first 8 lines
    var skipWords = /^(求职|简历|个人|基本|联系|电话|邮箱|教育|工作|技能|项目|经验|自我|职业|期望|求职意向|个人信息|教育背景|工作经验|专业技能|项目经验|在校|实习|荣誉|证书)/;
    for (var i = 0; i < Math.min(lines.length, 8); i++) {
      var line = lines[i];
      if (line.length < 2 || line.length > 6) continue;
      if (/[@\d]/.test(line)) continue;
      if (skipWords.test(line)) continue;
      if (/^[一-龥]{2,4}$/.test(line)) { result.name = line; break; }
    }
    // Fallback: if still no name, use first non-empty short line
    if (!result.name && lines.length > 0) {
      for (var i2 = 0; i2 < Math.min(lines.length, 5); i2++) {
        var l = lines[i2];
        if (l.length >= 2 && l.length <= 4 && !skipWords.test(l) && !/[@\d]/.test(l)) {
          result.name = l;
          break;
        }
      }
    }
  }

  // ===== University / Education =====
  var eduKeywords = ['大学', '学院', 'University', 'College', 'Institute', 'School', 'Stanford', 'MIT', 'CMU', '清华', '北大', '复旦', '浙大', '上交', '华科', '北航', '中科大', '南大', '同济', '武大', '中山', '厦大'];
  var eduLevels = [
    { regex: /博士|Ph\.?D|Doctor/i, level: '博士' },
    { regex: /硕士|Master|MBA/i, level: '硕士' },
    { regex: /本科|Bachelor|学士/i, level: '本科' }
  ];
  for (var j = 0; j < lines.length; j++) {
    for (var k = 0; k < eduKeywords.length; k++) {
      if (lines[j].indexOf(eduKeywords[k]) !== -1) {
        result.university = lines[j].replace(/[\s]{2,}/g, ' ').trim();
        var eduText = lines[j] + ' ' + (lines[j + 1] || '') + ' ' + (lines[j - 1] || '');
        for (var e = 0; e < eduLevels.length; e++) {
          if (eduLevels[e].regex.test(eduText)) { result.edu = eduLevels[e].level; break; }
        }
        if (!result.edu) result.edu = '本科';
        break;
      }
    }
    if (result.university) break;
  }

  // ===== Experience years =====
  var expMatch = text.match(/(\d{1,2})\s*(?:年|年工作经验|年以上|年\+经验)/);
  if (expMatch) result.exp = expMatch[1];

  // ===== Company (improved) =====
  // Try "公司：XXX" / "就职于XXX" / "任职于XXX" patterns first
  var compLabel = text.match(/(?:公司|就职于|任职于| currently at | working at )[\s：:]*([^\s,，。\n]{2,20})/i);
  if (compLabel) {
    result.company = compLabel[1].trim();
  } else {
    // Known companies list
    var knownCompanies = ['百度', '阿里', '腾讯', '字节跳动', '华为', '美团', '京东', '网易', '小米', '蔚来', '小鹏', '理想', '小马智行', 'Waymo', 'Google', 'Microsoft', 'Apple', 'Amazon', 'Meta', '商汤', '旷视', '地平线', '大疆', '滴滴', '快手', '小红书', 'B站', '哔哩哔哩', '新浪', '搜狐', '携程', '蚂蚁', '钉钉', '微软', '英特尔', '英伟达', '高通', '博世', '微软'];
    for (var ci = 0; ci < knownCompanies.length; ci++) {
      if (text.indexOf(knownCompanies[ci]) !== -1) {
        result.company = knownCompanies[ci];
        break;
      }
    }
  }

  // ===== Title (improved - search entire text) =====
  var titlePatterns = [
    '高级技术总监', '技术总监', '高级算法工程师', '算法工程师', '算法专家', '感知算法专家',
    '高级工程师', '资深工程师', '工程师', '架构师', '高级架构师', '首席架构师',
    '产品经理', '高级产品经理', '产品总监', '设计总监',
    '前端工程师', '后端工程师', '全栈工程师', '数据工程师', '数据分析师',
    '研发经理', '技术经理', '项目经理', '部门经理', '总经理', '副总裁', '总监',
    '专家', '首席科学家', '研究员', '高级研究员',
    'Lead', 'Manager', 'Director', 'Engineer', 'Architect', 'Designer',
    'Senior', 'Staff', 'Principal', 'Head', 'VP', 'CTO', 'CEO'
  ];
  // Try "职位/岗位：XXX" label first
  var titleLabel = text.match(/(?:职位|岗位|职务)[：:\s]*([^\s,，。\n]{2,20})/);
  if (titleLabel) {
    result.title = titleLabel[1].trim();
  } else {
    // Search entire text for title patterns
    for (var ti = 0; ti < titlePatterns.length; ti++) {
      var re = new RegExp('[\\u4e00-\\u9fa5A-Za-z]*' + titlePatterns[ti] + '[\\u4e00-\\u9fa5A-Za-z]*');
      var titleMatch = text.match(re);
      if (titleMatch) {
        var t = titleMatch[0].replace(/\s+/g, '').trim();
        if (t.length >= 2 && t.length <= 15) { result.title = t; break; }
      }
    }
  }

  // ===== Skills =====
  var knownSkills = [
    'Python', 'Java', 'C++', 'Go', 'JavaScript', 'TypeScript', 'React', 'Vue', 'Angular',
    'Node.js', 'Docker', 'Kubernetes', 'K8s', 'MySQL', 'Redis', 'Kafka', 'MongoDB',
    'PyTorch', 'TensorFlow', '机器学习', '深度学习', 'NLP', '计算机视觉', 'CV',
    'Linux', 'Git', 'SQL', 'Spark', 'Hadoop', 'Flink', 'Hive',
    'Spring', 'Django', 'Flask', 'FastAPI', 'Rails',
    'AWS', 'Azure', 'GCP', '阿里云',
    'Figma', 'Sketch', 'Photoshop', 'Illustrator',
    '自动驾驶', '感知算法', 'BEV', 'LiDAR', '激光雷达', '点云', 'CUDA',
    'Flutter', 'React Native', 'Swift', 'Kotlin', 'Objective-C',
    '微服务', '微前端', 'RESTful', 'GraphQL', 'gRPC',
    'CI/CD', 'Jenkins', 'GitHub Actions',
    'Tableau', 'PowerBI', '数据分析', '数据仓库', 'ETL',
    'A/B测试', '用户增长', '产品设计', '交互设计'
  ];
  var foundSkills = [];
  knownSkills.forEach(function(skill) {
    if (text.indexOf(skill) !== -1 && foundSkills.indexOf(skill) === -1) foundSkills.push(skill);
  });
  result.skills = foundSkills.slice(0, 10);

  // ===== City =====
  var cities = ['北京', '上海', '深圳', '杭州', '广州', '成都', '南京', '武汉', '西安', '苏州', '天津', '重庆', '长沙', '郑州', '青岛', '旧金山', '纽约', '伦敦', '新加坡', '东京', '西雅图', '湾区'];
  for (var ci2 = 0; ci2 < cities.length; ci2++) {
    if (text.indexOf(cities[ci2]) !== -1) { result.city = cities[ci2]; break; }
  }

  // ===== Salary (真实薪资) =====
  // Try: "期望薪资：30万" / "目前薪资：40万" / "年薪：50万" / "薪资：30-50万"
  var salaryPatterns = [
    /(?:期望|期望薪资|目前|当前|现有|年薪|月薪|薪资|薪酬|待遇)[：:\s]*(\d{2,3})\s*[万w]/i,
    /(\d{2,3})\s*[-~至到]\s*(\d{2,3})\s*[万w]/,
    /(\d{2,3})\s*[万w](?:\/年|\/月|每年|每月)?/
  ];
  for (var si = 0; si < salaryPatterns.length; si++) {
    var salaryMatch = text.match(salaryPatterns[si]);
    if (salaryMatch) {
      // If range like "30-50万", take the lower number as current, upper as expected
      if (salaryMatch[2]) {
        result.salary = salaryMatch[1]; // current salary = lower bound
      } else {
        result.salary = salaryMatch[1];
      }
      break;
    }
  }

  console.log('[简历解析结果]', result);
  return result;
}

// ===== Parse & Fill Form =====
async function parseAllFiles() {
  var statusEl = document.getElementById('parse-status');
  statusEl.innerHTML = '<div class="parse-status"><div class="spinner"></div><span>正在解析简历...</span></div>';

  for (var i = 0; i < parsedResults.length; i++) {
    var r = parsedResults[i];
    if (r.status === 'done') continue;
    r.status = 'parsing';
    renderUploadList();
    try {
      var text = await extractText(r.file);
      r.rawText = text;
      r.extracted = parseResumeText(text);
      r.status = 'done';
    } catch (err) {
      r.status = 'error';
      r.error = err.message || '无法解析';
    }
    renderUploadList();
  }

  // Fill form with first successful parse
  var first = parsedResults.find(function(r) { return r.status === 'done'; });
  if (first) {
    fillFormFromParsed(first);
    var ext = first.extracted || {};
    var debugHtml = '<div style="background:#f8f9fc;border:1px solid var(--border);border-radius:8px;padding:10px;margin-top:8px;font-size:11px">';
    debugHtml += '<div style="font-weight:700;margin-bottom:6px;color:var(--primary)">📋 解析结果（请核对）：</div>';
    debugHtml += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px">';
    debugHtml += '<div><b>姓名：</b>' + (ext.name || '<span style="color:var(--red)">未识别</span>') + '</div>';
    debugHtml += '<div><b>公司：</b>' + (ext.company || '<span style="color:var(--red)">未识别</span>') + '</div>';
    debugHtml += '<div><b>职位：</b>' + (ext.title || '<span style="color:var(--red)">未识别</span>') + '</div>';
    debugHtml += '<div><b>学历：</b>' + (ext.edu || '-') + '</div>';
    debugHtml += '<div><b>城市：</b>' + (ext.city || '-') + '</div>';
    debugHtml += '<div><b>经验：</b>' + (ext.exp ? ext.exp + '年' : '-') + '</div>';
    debugHtml += '<div><b>薪资：</b>' + (ext.salary ? ext.salary + '万' : '-') + '</div>';
    debugHtml += '<div><b>技能：</b>' + (ext.skills.length ? ext.skills.join(', ') : '-') + '</div>';
    debugHtml += '</div></div>';
    // Show raw text preview for debugging
    var rawPreview = (first.rawText || '').substring(0, 800).replace(/</g, '&lt;').replace(/\n{2,}/g, '\n');
    debugHtml += '<details style="margin-top:8px"><summary style="cursor:pointer;font-size:10px;color:var(--text2)">📄 查看简历原文（前800字）</summary><pre style="background:#fff;border:1px solid var(--border);border-radius:6px;padding:8px;font-size:10px;max-height:200px;overflow:auto;white-space:pre-wrap;margin-top:4px">' + rawPreview + '</pre></details>';
    statusEl.innerHTML = '<div class="parse-status"><span class="done">✓ 解析完成，信息已自动填写</span></div>' + debugHtml;
    showToast('简历解析完成，请核对信息');
  } else {
    statusEl.innerHTML = '<div class="parse-status"><span class="fail">✕ 解析失败，请手动填写</span></div>';
  }
}

function fillFormFromParsed(r) {
  var ext = r.extracted || {};
  console.log('[自动填表] 解析结果:', ext);
  if (ext.name) document.getElementById('f-name').value = ext.name;
  if (ext.company) document.getElementById('f-company').value = ext.company;
  if (ext.title) document.getElementById('f-title').value = ext.title;
  if (ext.edu) document.getElementById('f-edu').value = ext.edu;
  if (ext.exp) document.getElementById('f-exp').value = ext.exp;
  if (ext.city) document.getElementById('f-city').value = ext.city;
  if (ext.age) document.getElementById('f-age').value = ext.age;
  if (ext.salary) document.getElementById('f-salary').value = ext.salary;

  // Skills
  formSkills = ext.skills ? ext.skills.slice() : [];
  renderFormTags('f-skills-wrap', 'f-skills-input', formSkills);

  // Tags
  formTags = ['简历解析'];
  if (ext.phone) formTags.push('电话: ' + ext.phone);
  if (ext.email) formTags.push('邮箱: ' + ext.email);
  if (ext.university) formTags.push(ext.university);
  renderFormTags('f-tags-wrap', 'f-tags-input', formTags);

  // Note with preview
  if (ext.rawText) {
    var preview = ext.rawText.substring(0, 500).replace(/\n{2,}/g, '\n');
    document.getElementById('f-note').value = '--- 简历原文预览 ---\n' + preview + (ext.rawText.length > 500 ? '\n...(已截断)' : '');
  }

  pendingUploadFile = r.file;
}
